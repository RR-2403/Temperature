<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <form>
    <h1>Temperature Converter</h1>
    <input type="number" id="tempInput" placeholder="Enter temperature" value="0"><br>
    
    <input type="radio" id="tofarenheit" name="unit" value="celsius" checked>
    <label for="tofarenheit">Celsius ➡️ Fahrenheit</label><br>
    
    <input type="radio" id="toCelsius" name="unit" value="fahrenheit">
    <label for="toCelsius">Fahrenheit ➡️ Celsius</label><br>

    <button type="button" class="btn btn-outline-primary">Convert</button>

    <p id="result"></p>
  </form>

  <script src="app.js"></script>
</body>
</html>
